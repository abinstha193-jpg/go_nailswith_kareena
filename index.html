<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Nails With Kareena</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #e6a4b4;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

/* SIDEBAR */
.side-menu {
  position: fixed;
  left: -260px;
  width: 220px;
  height: 100%;
  background: white;
  padding: 20px;
  transition: 0.3s;
}

.side-menu.active {
  left: 0;
}

/* HERO */
.hero {
  height: 90vh;
  background: url("nail1.jpg") center/cover no-repeat;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.popup.show {
  display: flex;
}

.popup-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
}

/* VERTICAL LIST */
.popup-content ul {
  list-style: disc;
  padding-left: 20px;
}

.popup-content li {
  margin: 10px 0;
  cursor: pointer;
}

/* FOOTER TEXT */
.footer {
  text-align: center;
  padding: 15px;
  background: white;
  position: fixed;
  bottom: 0;
  width: 100%;
}
</style>

</head>

<body>

<!-- NAV -->

<div class="navbar">
<button onclick="toggleMenu()">☰</button>
<div>Go Nails With Kareena</div>
</div>

<!-- SIDEBAR -->

<div id="sideMenu" class="side-menu">
<a href="#" onclick="toggleMenu(); window.scrollTo(0,0)">Home</a><br>
<a href="#" onclick="openPopup('services');toggleMenu()">Services</a><br>
<a href="#" onclick="openPopup('gallery');toggleMenu()">Gallery</a><br>
</div>

<!-- HERO -->

<div class="hero"></div>

<!-- SERVICES -->

<div id="servicesPopup" class="popup">
<div class="popup-content">
<h2>Services</h2>
<ul>
<li>Gel</li>
<li>Polish</li>
<li onclick="closeAllPopups()">Close</li>
</ul>
</div>
</div>

<!-- GALLERY -->

<div id="galleryPopup" class="popup">
<div class="popup-content">
<h2>Gallery</h2>
<ul>
<li>All</li>
<li>Gel nail extension</li>
<li>Softgel overlay</li>
<li>Gel polish</li>
<li>Removal</li>
<li>Lashes extensions</li>
<li>Lash lift</li>
<li onclick="closeAllPopups()">Close</li>
</ul>
</div>
</div>

<!-- FOOTER -->

<div class="footer">
Go Nails With Kareena since 2022
</div>

<script>
function toggleMenu(){
  document.getElementById("sideMenu").classList.toggle("active");
}

function openPopup(type){
  document.getElementById(type+"Popup").classList.add("show");
}

function closeAllPopups(){
  document.querySelectorAll(".popup").forEach(p=>p.classList.remove("show"));
}
</script>

</body>
</html>

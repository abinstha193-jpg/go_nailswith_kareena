<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Go Nails With Kareena</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background-color: #e6a4b4;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  position: sticky;
  top: 0;
}

/* MENU ICON */
.menu-icon {
  font-size: 28px;
  cursor: pointer;
}

/* LOGO */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 50px;
  border-radius: 50%;
}

.logo-text {
  font-family: 'Playfair Display';
}

/* SIDEBAR */
.side-menu {
  position: fixed;
  top: 0;
  left: -260px;
  width: 220px;
  height: 100%;
  background: white;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  transition: 0.3s;
  border-radius: 0 20px 20px 0;
  z-index: 999;
}

.side-menu.active {
  left: 0;
}

/* BLUR */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(5px);
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
}

.overlay.active {
  opacity: 1;
  visibility: visible;
}

/* HERO */
.hero {
  height: 90vh;
  background: url("nail1.jpg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

/* BUTTON */
.book-btn {
  background: black;
  color: white;
  padding: 10px 18px;
  border-radius: 25px;
  text-decoration: none;
}

/* POPUP */
.popup {
  display: flex;
  justify-content: center;
  align-items: center;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
}

.popup.show {
  opacity: 1;
  visibility: visible;
}

.popup-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  transform: scale(0.8);
  transition: 0.3s;
}

.popup.show .popup-content {
  transform: scale(1);
}

/* SLIDER */
.slider {
  display: none;
  padding: 20px;
}

.slider.active {
  display: block;
}

.slider-track {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.slider-track img {
  height: 200px;
  border-radius: 10px;
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  justify-content: center;
  align-items: center;
}

.lightbox.show {
  display: flex;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

/* MOBILE */
@media(max-width:768px){
  .hero h1 { font-size: 28px; }
}
</style>

</head>

<body>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<!-- NAVBAR -->

<div class="navbar">

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="logo">
<img src="logo.jpeg">
<div class="logo-text">Go Nails With Kareena</div>
</div>

<a href="https://wa.me/9779813990976" class="book-btn">Book</a>

</div>

<!-- SIDEBAR -->

<div id="sideMenu" class="side-menu">

<a href="#">Home</a> <a href="#" onclick="openPopup('services');toggleMenu()">Services</a> <a href="#" onclick="openSlider('all');toggleMenu()">Gallery</a> <a href="#" onclick="openPopup('price');toggleMenu()">Prices</a> <a href="#" onclick="openPopup('contact');toggleMenu()">Contact</a>

</div>

<!-- HERO -->

<div class="hero">
<div>
<h1>Be Happy. Be Beautiful. Be You.</h1>
<p>Premium Nail & Lash Services</p>
</div>
</div>

<!-- POPUPS -->

<div id="servicesPopup" class="popup">
<div class="popup-content">
<h2>Services</h2>
<button onclick="openSlider('gel')">Gel Nails</button>
<button onclick="openSlider('polish')">Gel Polish</button>
<button onclick="closeAllPopups()">Close</button>
</div>
</div>

<div id="pricePopup" class="popup">
<div class="popup-content">
<h2>Prices</h2>
<p>Gel Polish - Rs 1500</p>
<p>Extensions - Rs 2500</p>
<button onclick="closeAllPopups()">Close</button>
</div>
</div>

<div id="contactPopup" class="popup">
<div class="popup-content">
<h2>Contact</h2>
<p>📞 9813990976</p>
<button onclick="closeAllPopups()">Close</button>
</div>
</div>

<!-- SLIDER -->

<div id="slider" class="slider">
<button onclick="closeSlider()">Close</button>
<div id="sliderTrack" class="slider-track"></div>
</div>

<!-- LIGHTBOX -->

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
<img id="lightboxImg">
</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">
<i class="fas fa-home"></i>
<i class="fas fa-images" onclick="openSlider('all')"></i>
<i class="fas fa-tags" onclick="openPopup('price')"></i>
</div>

<script>

const galleryData = {
  gel: ["nail1.jpg","nail2.jpg"],
  polish: ["nail2.jpg","nail1.jpg"],
  all: ["nail1.jpg","nail2.jpg","nail1.jpg"]
};

function toggleMenu(){
  document.getElementById("sideMenu").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

function openPopup(type){
  closeAllPopups();
  document.getElementById(type+"Popup").classList.add("show");
}

function closeAllPopups(){
  document.querySelectorAll(".popup").forEach(p=>p.classList.remove("show"));
}

function openSlider(type){
  closeAllPopups();
  const track=document.getElementById("sliderTrack");
  track.innerHTML="";
  galleryData[type].forEach(img=>{
    let i=document.createElement("img");
    i.src=img;
    i.onclick=()=>openLightbox(img);
    track.appendChild(i);
  });
  document.getElementById("slider").classList.add("active");
}

function closeSlider(){
  document.getElementById("slider").classList.remove("active");
}

function openLightbox(src){
  document.getElementById("lightboxImg").src=src;
  document.getElementById("lightbox").classList.add("show");
}

function closeLightbox(){
  document.getElementById("lightbox").classList.remove("show");
}

/* SWIPE */
let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>80) openSlider('all');
  if(endX-startX>80) closeSlider();
});
</script>

</body>
</html>

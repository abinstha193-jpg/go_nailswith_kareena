<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background-color: #e6a4b4;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: #e6a4b4;
  position: sticky;
  top: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
}

.nav-links {
  display: flex;
  gap: 20px;
}

.nav-links a {
  text-decoration: none;
  color: black;
  font-size: 20px;
}

/* BUTTON */
.book-btn {
  background: black;
  color: white;
  padding: 10px 18px;
  border-radius: 25px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 90vh;
  background: url("nail1.jpg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

/* ===== SERVICES ===== */
.services {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 40px;
}

.service img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

/* ===== POPUP ===== */
.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.popup-content {
  background: white;
  padding: 20px;
  width: 300px;
  margin: 100px auto;
  text-align: center;
  border-radius: 10px;
}

/* ===== SLIDER ===== */
.slider {
  display: none;
  padding: 20px;
}

.slider.active {
  display: block;
}

.slider-track {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scroll-behavior: smooth;
}

.slider-track img {
  height: 200px;
  border-radius: 10px;
}

/* ===== LIGHTBOX ===== */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.lightbox img {
  max-width: 90%;
}

.lightbox.show {
  display: flex;
}

/* ===== INSTAGRAM ===== */
.insta {
  padding: 30px;
  text-align: center;
}

.insta iframe {
  border: none;
  width: 300px;
  height: 400px;
}

/* ===== MOBILE ===== */
@media (max-width:768px){
  .navbar {
    flex-direction: column;
  }

  .nav-links {
    flex-wrap: wrap;
    justify-content: center;
  }

  .hero h1 {
    font-size: 30px;
  }

  .services {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<a href="https://wa.me/9779813990976" class="book-btn">Book Now</a>

<div class="hero">

<!-- SERVICES POPUP -->

<script>
const galleryData = {
  gel: ["nail1.jpg","nail2.jpg"],
  polish: ["nail2.jpg","nail1.jpg"],
  all: ["nail1.jpg","nail2.jpg","nail1.jpg"]
};

function openPopup(type){
  closeAllPopups();
  document.getElementById(type + "Popup").style.display = "block";
}

function closeAllPopups(){
  document.querySelectorAll(".popup").forEach(p => p.style.display = "none");
}

function openSlider(type){
  closeAllPopups();
  const track = document.getElementById("sliderTrack");
  track.innerHTML = "";

  galleryData[type].forEach(img=>{
    const i = document.createElement("img");
    i.src = img;
    i.onclick = ()=>openLightbox(img);
    track.appendChild(i);
  });

  document.getElementById("slider").classList.add("active");
}

function closeSlider(){
  document.getElementById("slider").classList.remove("active");
}

function openLightbox(src){
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").classList.add("show");
}

function closeLightbox(){
  document.getElementById("lightbox").classList.remove("show");
}

/* TOUCH SWIPE */
let isDown=false,startX,scrollLeft;
const slider=document.getElementById("sliderTrack");

slider.addEventListener("mousedown",e=>{
  isDown=true;
  startX=e.pageX-slider.offsetLeft;
  scrollLeft=slider.scrollLeft;
});

slider.addEventListener("mouseleave",()=>isDown=false);
slider.addEventListener("mouseup",()=>isDown=false);

slider.addEventListener("mousemove",e=>{
  if(!isDown) return;
  e.preventDefault();
  const x=e.pageX-slider.offsetLeft;
  const walk=(x-startX)*2;
  slider.scrollLeft=scrollLeft-walk;
});
</script>

</body>
